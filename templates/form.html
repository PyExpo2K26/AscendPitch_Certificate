<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Certificate Generator</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #0b3b6f;
            --accent-2: #0ea5e9;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(130deg, #e0f2fe, #f8fafc 45%, #e2e8f0);
            color: var(--text);
        }

        .container {
            max-width: 850px;
            margin: 30px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(2, 6, 23, 0.12);
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            color: var(--accent);
        }

        .meta {
            margin: 6px 0;
            color: var(--muted);
        }

        .alert {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 11px;
            font-size: 14px;
            background: #ffffff;
        }

        button {
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #ffffff;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Event Certificate Generator</h1>
            <p class="meta"><strong>Event:</strong> {{ event_name }}</p>
            <p class="meta"><strong>Date:</strong> {{ event_date }}</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('generate_route') }}" method="POST" enctype="multipart/form-data">
                <div>
                    <label for="name">Participant Name</label>
                    <input id="name" name="name" type="text" required />
                </div>

                <div>
                    <label for="college">College Name</label>
                    <input id="college" name="college" type="text" required />
                </div>

                <div>
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" required />
                </div>

                <div class="full">
                    <label for="photo">Participant Photo</label>
                    <input id="photo" name="photo" type="file" accept="image/*" required />
                </div>

                <div class="full">
                    <button type="submit">Generate Certificate</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
